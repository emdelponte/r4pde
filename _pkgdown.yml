url: https://emdelponte.github.io/r4pde/

template:
  bootstrap: 5
  light-switch: true

home:
  title: r4pde
  description: Companion package to the book "R for Plant Disease Epidemiology"
  license: FALSE
development:
  mode: auto

reference:
  - title: "Disease Quantification"
    desc: "Functions for calculating disease indices and survival-based metrics."
    contents:
      - CompMuCens
      - DSI
      - DSI2

  - title: "Spatial analysis"
    desc: "Functions to detect and quantify spatial structure in disease data."
    contents:
      - AFSD
      - BPL
      - count_subareas
      - count_subareas_random
      - join_count
      - oruns_test
      - oruns_test_boustrophedon
      - oruns_test_byrowcol
      - plot_AFSD
      - windowpane
      - windowpane_tests

  - title: "Disease modeling"
    desc: "Functions for fitting gradient models and retrieving climate data."
    contents:
      - fit_gradients
      - get_brdwgd
      - get_era5
      - get_nasapower

  - title: "Datasets"
    desc: "Datasets used in the examples and analyses."
    contents:
      - BlastWheat
      - BudBlightSoybean
      - DidymellaWatermelon
      - FHBWheat
      - FusariumBanana
      - RustSoybean
      - SpatialAggregated
      - SpatialRandom
      - WhiteMoldSoybean

  - title: "Miscellaneous"
    desc: "Utility functions for plotting and customization."
    contents:
      - theme_r4pde

  - title: "Functional Analysis"
    desc: "Functions for functional modeling and comparison of epidemic curves."
    contents:
      - compare_curves
      - functional_curves
      - functional_distances
      - functional_instability
      - functional_resistance
      - plot.functional_curves
      - plot.r4pde_compare_curves
      - plot_curves
      - plot_dendrogram
      - plot_functional_instability
      - print.functional_curves
      - print.functional_distances
      - print.functional_resistance
      - print.suggest_k
      - suggest_k

  - title: "Diagnostics"
    contents:
      - diagnose_curves
      - plot_diagnostics
      - print.r4pde_curve_diagnostics
